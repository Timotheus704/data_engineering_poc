version: 2

models:
  - name: titanic_survival_summary
    description: Survival rates by passenger class and sex.
    columns:
      - name: sex
        data_tests:
          - not_null
      - name: total_passengers
        data_tests:
          - not_null
      - name: survival_rate_pct
        data_tests:
          - not_null
  - name: nyc_taxi_hourly
    description: Hourly trip, fare, and passenger aggregates for taxi trips.
    columns:
      - name: hour
        data_tests:
          - not_null
          - unique
      - name: total_trips
        data_tests:
          - not_null
      - name: avg_fare_usd
        data_tests:
          - not_null
  - name: stg_titanic
    description: >
      Cleaned and standardized Titanic passenger data. Applies type normalization,
      derived fields (family_size), null standardization, and code expansion
      (survived→boolean, pclass→name, embarked→full port name).
    columns:
      - name: passenger_key
        description: "Surrogate key from the staging table auto-increment ID"
        data_tests: [not_null, unique]
      - name: did_survive
        description: "Boolean survival flag. True=survived, False=did not survive, NULL=unknown"
        data_tests: [not_null]
      - name: family_size
        description: "Total family members aboard: siblings_spouses + parents_children"
        data_tests: [not_null]     
