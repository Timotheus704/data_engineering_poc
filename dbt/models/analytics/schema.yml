version: 2

models:
  - name: stg_titanic
    description: "Staging model that normalizes raw Titanic passenger records into analysis-friendly columns. Fields are canonicalized, typed, and carry the pipeline's loaded_at timestamp."
    columns:
      - name: passenger_key
        description: "Surrogate integer key for each passenger row generated by the pipeline (stable within a run)."
        tests:
          - not_null
          - unique
      - name: source_passenger_id
        description: "Original passenger identifier from the raw source (may be non-numeric or duplicate across sources)."
        tests:
          - not_null
      - name: loaded_at
        description: "Timestamp when the row was loaded into the staging table (pipeline ingestion time)."
        tests:
          - not_null
      - name: did_survive
        description: "Normalized survival flag. True/1 indicates survival; False/0 indicates death. May be null if source value is missing."
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
                quote: false
      - name: passenger_class_num
        description: "Passenger travel class as an integer (1 = 1st, 2 = 2nd, 3 = 3rd, Null = Unknown)."
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3, null]
                quote: false
      - name: passenger_class_name
        description: "Textual passenger class label (e.g., '1st', '2nd', '3rd')."
      - name: full_name
        description: "Concatenated passenger name (Last, First) as parsed from the raw record."
      - name: sex
        description: "Normalized sex value standardized to lowercase (e.g., 'male', 'female')."
        tests:
          - accepted_values:
              arguments:
                values: ['male', 'female']
                quote: true
      - name: age_years
        description: "Passenger age in years when available; null when age is not recorded."
      - name: is_age_unknown
        description: "Boolean flag indicating whether age was missing in the source."
      - name: siblings_spouses_count
        description: "Number of siblings / spouses aboard (SibSp from source)."
      - name: parents_children_count
        description: "Number of parents / children aboard (Parch from source)."
      - name: family_size
        description: "Derived family size computed as siblings_spouses_count + parents_children_count + 1 (self)."
      - name: ticket_number
        description: "Raw ticket number/string from source; kept for troubleshooting and joins back to raw dataset."
      - name: fare_gbp
        description: "Fare amount in GBP as parsed from the source. Negative or missing fares are coerced to zero in the staging SQL."
      - name: cabin_number
        description: "Cabin identifier when available; often sparse in the source."
      - name: embarkation_port
        description: "Full port name (e.g., 'Cherbourg', 'Queenstown', 'Southampton') when available."
      - name: embarkation_code
        description: "Embarkation code shorthand (C, Q, S)."
        tests:
          - accepted_values:
              arguments:
                values: ['C', 'Q', 'S']
                quote: true

  - name: stg_nyc_taxi
    description: "Staging model for NYC taxi trips. Normalizes vendor/rate/payment codes, coerces monetary fields to non-negative values, and exposes the pipeline loaded_at timestamp."
    columns:
      - name: trip_key
        description: "Surrogate key for the trip row produced by the pipeline."
        tests:
          - not_null
          - unique
      - name: source_row_hash
        description: "Row hash derived from the raw source row to detect duplicates/changes."
        tests:
          - not_null
      - name: loaded_at
        description: "Pipeline ingestion timestamp for this row."
        tests:
          - not_null
      - name: pickup_datetime
        description: "Timestamp when the trip started (pickup)."
      - name: dropoff_datetime
        description: "Timestamp when the trip ended (dropoff)."
      - name: passenger_count
        description: "Number of passengers recorded on the trip."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
              quote: false
      - name: trip_distance_miles
        description: "Trip distance in miles as parsed or converted by the staging SQL."
      - name: vendor_id
        description: "Numeric vendor identifier from the raw feed."
        tests:
          - accepted_values:
              values: [1, 2]
              quote: false
      - name: vendor_name
        description: "Human-friendly vendor name derived from vendor_id."
      - name: rate_code_id
        description: "Numeric rate code identifier."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
              quote: false
      - name: rate_type
        description: "Human-friendly rate code label derived from rate_code_id."
      - name: payment_type
        description: "Numeric payment type code from the meter (e.g., 1 = credit card)."
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5, 6]
              quote: false
      - name: payment_method
        description: "Human-friendly payment method label derived from payment_type."
      - name: fare_amount_usd
        description: "Fare amount in USD after normalization/coercion to non-negative values."
      - name: tip_amount_usd
        description: "Tip amount in USD after normalization/coercion to non-negative values."
      - name: total_amount_usd
        description: "Total amount charged for the trip (fare + fees + tip etc.) after normalization."

  - name: titanic_survival_summary
    description: "Aggregate summary of survival statistics by passenger class and sex. Aggregates are computed from stg_titanic."
    columns:
      - name: passenger_class_num
        description: "Passenger class numeric bucket (1, 2, or 3)."
        tests:
          - accepted_values:
              arguments:
                values: [1, 2, 3]
                quote: false
      - name: sex
        description: "Sex of passengers in the bucket (male/female)."
        tests:
          - accepted_values:
              arguments:
                values: ['male', 'female']
                quote: true
      - name: total_passengers
        description: "Count of passengers in the group."
        tests:
          - not_null
      - name: survivors
        description: "Number of survivors in the group."
      - name: survival_rate_pct
        description: "Survival rate expressed as a percentage (0-100) computed as survivors / total_passengers * 100."
        tests:
          - not_null
      - name: avg_age
        description: "Average age for the group where age is available."
      - name: avg_fare
        description: "Average fare paid for the group where fare is available."

  - name: nyc_taxi_hourly
    description: "Hourly rollup of NYC taxi activity computed from stg_nyc_taxi."
    columns:
      - name: hour
        description: "Start of the hour window (UTC) that groups trips."
        tests:
          - not_null
          - unique
      - name: total_trips
        description: "Total number of trips that started in the hour."
        tests:
          - not_null
      - name: avg_distance_miles
        description: "Average trip distance in miles for trips starting in the hour."
      - name: avg_fare_usd
        description: "Average fare (USD) for trips starting in the hour."
      - name: avg_tip_usd
        description: "Average tip amount (USD) for trips starting in the hour."
      - name: total_passengers
        description: "Sum of passenger_count across trips that started in the hour."
