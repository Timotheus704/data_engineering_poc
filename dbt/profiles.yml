data_engineering_poc:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      user: "{{ env_var('POSTGRES_USER', 'poc_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'poc_password') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      dbname: "{{ env_var('POSTGRES_DB', 'poc_db') }}"
      schema: analytics
      threads: 4
      connect_timeout: 10
