name: data_engineering_poc
version: "1.0.0"
config-version: 2

profile: data_engineering_poc

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  data_engineering_poc:
    staging:
      +materialized: view
      +schema: staging_dbt
      stg_nyc_taxi:
        +pre-hook: "{{ check_migration_version() }}"  # Ensure migration version is verified before building this model to prevent drift between code and data migrations (operational correctness guard)
    analytics:
      +materialized: view
      +schema: analytics
