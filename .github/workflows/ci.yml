name: CI

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

# Node.js version policy: must match node:20-alpine used in all Dockerfiles.
# If you update the Docker base image, update this version too.
jobs:
  web-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: web/server/package-lock.json

      - name: Install dependencies (web/server)
        working-directory: web/server
        run: npm ci

      - name: Build TypeScript (web/server)
        working-directory: web/server
        run: npm run build

      - name: Run unit & integration tests (web/server)
        working-directory: web/server
        run: npx jest --config jest.config.ts --runInBand --testTimeout=20000

      - name: Lint (optional)
        working-directory: web/server
        run: npm run lint || true

  web-client:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/client/package-lock.json

      - name: Install dependencies (web/client)
        working-directory: web/client
        run: npm ci

      - name: Build React App (web/client)
        # This runs 'tsc && vite build' which catches the type errors we saw earlier
        working-directory: web/client
        run: npm run build
