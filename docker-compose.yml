services:
  postgres:
    image: postgres:16-alpine
    container_name: poc_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: poc_app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src
    command: npx ts-node src/index.ts

  pipeline_titanic:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    container_name: poc_pipeline_titanic
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipelines:/pipelines
      - ${HOME}/.kaggle:/root/.kaggle:ro
    command: python titanic/ingest.py
    profiles: [pipeline]

  pipeline_nyc_taxi:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    container_name: poc_pipeline_nyc_taxi
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipelines:/pipelines
      - ${HOME}/.kaggle:/root/.kaggle:ro
    command: python nyc_taxi/ingest.py
    profiles: [pipeline]

  # ── Web application ──────────────────────────────────────────────────────────

  web_server:
    build:
      context: ./web/server
      dockerfile: Dockerfile
    container_name: poc_web_server
    env_file: .env
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:3000
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: [web]

  web_client:
    build:
      context: ./web/client
      dockerfile: Dockerfile
    container_name: poc_web_client
    ports:
      - "3000:80"
    depends_on:
      - web_server
    restart: unless-stopped
    profiles: [web]

volumes:
  postgres_data:
