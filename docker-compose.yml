services:
  postgres:
    image: postgres:16-alpine
    container_name: poc_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: poc_app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src
    command: npx ts-node src/index.ts

  pipeline_titanic:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    container_name: poc_pipeline_titanic
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipelines:/pipelines
      - ${HOME}/.kaggle:/root/.kaggle:ro
    command: python titanic/ingest.py
    profiles: [pipeline]

  pipeline_nyc_taxi:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    container_name: poc_pipeline_nyc_taxi
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipelines:/pipelines
      - ${HOME}/.kaggle:/root/.kaggle:ro
    command: python nyc_taxi/ingest.py
    profiles: [pipeline]

volumes:
  postgres_data:
