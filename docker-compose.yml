x-airflow-common: &airflow-common
  build:
    context: ./orchestration/airflow
    dockerfile: Dockerfile
  env_file: .env
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    AIRFLOW__DATABASE__SQL_ALCHEMY_SCHEMA: airflow
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    # Increase heartbeat timeout to prevent false-positive scheduler deaths
    AIRFLOW__SCHEDULER__SCHEDULER_HEARTBEAT_SEC: 30
    # Limit parsing processes to reduce CPU spikes on small machines
    AIRFLOW__SCHEDULER__PARSING_PROCESSES: 2
    KAGGLE_CONFIG_DIR: /opt/airflow/.kaggle
    POSTGRES_HOST: postgres
    PYTHONPATH: /opt/airflow/repo/pipelines
  user: "${AIRFLOW_UID:-50000}:0"
  deploy:
    resources:
      limits:
        cpus: '4.0'
        memory: 8192M
      reservations:
        cpus: '1.0'
        memory: 2048M
  volumes:
    - ./orchestration/airflow/dags:/opt/airflow/dags
    - ./orchestration/airflow/logs:/opt/airflow/logs
    - .:/opt/airflow/repo
    - ${HOME}/.kaggle:/opt/airflow/.kaggle:ro
  depends_on:
    postgres:
      condition: service_healthy
  profiles: [orchestration]

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: poc_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    profiles: [streaming]

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: poc_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      retries: 5
    profiles: [streaming]
  postgres:
    image: postgres:16-alpine
    container_name: poc_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '0.5'
          memory: 1024M

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: poc_app
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app/src:/app/src
    command: npx ts-node src/index.ts

  pipeline_titanic:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    container_name: poc_pipeline_titanic
    env_file: .env
    environment:
      - PYTHONPATH=/pipelines
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipelines:/pipelines
      - ${HOME}/.kaggle:/root/.kaggle:ro
    command: python titanic/ingest.py
    profiles: [pipeline]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M

  pipeline_nyc_taxi:
    build:
      context: ./pipelines
      dockerfile: Dockerfile
    container_name: poc_pipeline_nyc_taxi
    env_file: .env
    environment:
      - PYTHONPATH=/pipelines
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pipelines:/pipelines
      - ${HOME}/.kaggle:/root/.kaggle:ro
    command: python nyc_taxi/ingest.py
    profiles: [pipeline]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M

  # ── Web application ──────────────────────────────────────────────────────────

  web_server:
    build:
      context: ./web/server
      dockerfile: Dockerfile
    container_name: poc_web_server
    env_file: .env
    environment:
      - PORT=3001
      - HOST=0.0.0.0
      - CORS_ORIGIN=http://localhost:3000
      - NODE_ENV=production
      - POSTGRES_HOST=postgres
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles: [web]

  web_client:
    build:
      context: ./web/client
      dockerfile: Dockerfile
    container_name: poc_web_client
    ports:
      - "3000:80"
    depends_on:
      - web_server
    restart: unless-stopped
    profiles: [web]

  # ── Orchestration and transformation ───────────────────────────────────────

  airflow_init:
    <<: *airflow-common
    container_name: poc_airflow_init
    command: >
      bash -c "airflow db migrate &&
      airflow users create
      --username ${AIRFLOW_ADMIN_USER:-admin}
      --password ${AIRFLOW_ADMIN_PASSWORD:-admin}
      --firstname Data
      --lastname Engineer
      --role Admin
      --email ${AIRFLOW_ADMIN_EMAIL:-admin@example.com} || true"

  airflow_webserver:
    <<: *airflow-common
    container_name: poc_airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow_init:
        condition: service_completed_successfully

  airflow_scheduler:
    <<: *airflow-common
    container_name: poc_airflow_scheduler
    command: scheduler
    depends_on:
      airflow_init:
        condition: service_completed_successfully

  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.8.2
    container_name: poc_dbt
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./dbt:/usr/app
    working_dir: /usr/app
    depends_on:
      postgres:
        condition: service_healthy
    command: run --profiles-dir .
    profiles: [transform]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M

  great_expectations:
    build:
      context: ./orchestration/airflow
      dockerfile: Dockerfile
    container_name: poc_great_expectations
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      PYTHONPATH: /opt/repo/pipelines
    volumes:
      - .:/opt/repo
    working_dir: /opt/repo
    depends_on:
      postgres:
        condition: service_healthy
    command: python orchestration/great_expectations/validate.py titanic_staging
    profiles: [quality]
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M

volumes:
  postgres_data:
