version: 2

sources:
  - name: staging
    description: Raw ingested tables loaded by Python pipelines.
    schema: staging
    tables:
      - name: titanic
        description: Passenger records from the Kaggle Titanic competition.
        loaded_at_field: loaded_at
        freshness:
          warn_after:
            count: 24
            period: hour
          error_after:
            count: 48
            period: hour
        columns:
          - name: id
            data_tests:
              - not_null
              - unique
          - name: passenger_id
            data_tests:
              - not_null
          - name: survived
            data_tests:
              - accepted_values:
                  values: [0, 1]
                  quote: false
          - name: pclass
            data_tests:
              - accepted_values:
                  values: [1, 2, 3]
                  quote: false
      - name: nyc_taxi
        description: NYC taxi trip sample loaded from Kaggle.
        loaded_at_field: loaded_at
        freshness:
          warn_after:
            count: 24
            period: hour
          error_after:
            count: 48
            period: hour
        columns:
          - name: id
            data_tests:
              - not_null
              - unique
          - name: pickup_datetime
            data_tests:
              - not_null
          - name: passenger_count
            data_tests:
              - accepted_values:
                  values: [1, 2, 3, 4, 5, 6]
                  quote: false
          - name: fare_amount
            data_tests:
              - not_null
          - name: source_row_hash
            data_tests:
              - not_null
              - unique

