# Primary Docker Compose entry — core services (Postgres) + includes for modular fragments
# Uses the Compose v2.20+ `include` directive to keep the main file minimal.
# If your local Docker Compose does not support `include`, run the fallback below:
# docker compose -f docker-compose.yml -f docker-compose.web.yml -f docker-compose.orchestration.yml -f docker-compose.streaming.yml up

include:
  - ./docker-compose.web.yml
  - ./docker-compose.orchestration.yml
  - ./docker-compose.streaming.yml

services:
  postgres:
    image: postgres:16-alpine
    container_name: poc_postgres
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4096M
        reservations:
          cpus: '0.5'
          memory: 1024M

volumes:
  postgres_data:

